name: Sync API Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch API data
        env:
          IG_ACCESS_TOKEN:     ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:          ${{ secrets.IG_USER_ID }}
          TRADOVATE_USER:      ${{ secrets.TRADOVATE_USER }}
          TRADOVATE_PASS:      ${{ secrets.TRADOVATE_PASS }}
          DIGISTORE24_API_KEY: ${{ secrets.DIGISTORE24_API_KEY }}
        run: python sync/fetch_data.py

      - name: Commit and push data
        run: |
          git config --local user.email "bot@fsfinance.de"
          git config --local user.name  "SF Finance Bot"
          git add api/data.json
          git diff --staged --quiet || git commit -m "chore: api sync $(date -u +'%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          git push
